<html lang="PT-BR">
    <!--Cabeçalho-->
    <head>
        <meta charset = "UTF-8">
        <title>CADASTRO</title>
    </head>
    <!--Corpo-->
    <body bgcolor="white" text="darkred" link="red" alink="white" vlink="red">
        <center>
            <br>

             <p>Preencha o formulário abaixo para se cadastrar e receber as últimas notícias e atualizações sobre a Fórmula 1.</p>
        </center>
        <form>
            <p>
                <center>
                <fieldset>
                    <center>
                    <legend>Dados Pessoais</legend><br>
                    </center>
                    <input type="text" placeholder="Insira seu nome:" maxlength="60" size="60" required="yes"><br><p>
                    <input type="email" placeholder="Insira seu email:" maxlength="60" size="60" required="yes"><br><p>
                    <label>Data de Nascimento:</label>
                    <input type="date" format="dd-mm-yyyy"><p>
                    <label>Senha:</label>
                    <input type="password" size="20" maxlength="20"><p>
                    <label>Selecione sua idade:</label>
                    <input type="number" min="1" max="100"><p>
                    <label>Observações Gerais:</label><br>
                    <textarea placeholder="Digite aqui seu comentário:" cols="50" rows="6"></textarea><p>
                    <label>Qual equipe você prefere:</label>
                    <ul>
                        <input type="checkbox">Scuderia Ferrari
                        <input type="checkbox">Mercedes AMG
                        <input type="checkbox">Red Bull Racing
                        <input type="checkbox">McLaren
                        <input type="checkbox">Racing Bulls
                        <input type="checkbox">Alpine
                        <input type="checkbox">Aston Martin
                        <input type="checkbox">Audi
                        <input type="checkbox">Cadillac
                        <input type="checkbox">Haas
                        <input type="checkbox">Williams
                    </ul>
                </fieldset>
                </center>
            <p>
                <center>
                    <input type="submit" value="Enviar">
                    <input type="reset" value="Limpar"><p>
                        
                </center>
            </p>
        </form>
    </body>
</html>
